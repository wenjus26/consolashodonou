<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Reçu ! | Consolas HODONOU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#d2bbff',
                            night: '#0b1326',
                            cream: '#dae2fd'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b1326; color: #dae2fd; font-family: 'Inter', sans-serif; overflow: hidden; }
        .success-circle { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 2s ease-in-out forwards; }
        @keyframes dash { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="text-center z-10">
        <!-- Animated Success Checkmark -->
        <div class="mb-10 flex justify-center">
            <svg class="w-32 h-32 text-brand-purple" viewBox="0 0 100 100">
                <circle class="success-circle" cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2"/>
                <path class="success-circle" d="M30 50 L45 65 L70 35" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" style="animation-delay: 0.5s;"/>
            </svg>
        </div>

        <h1 class="text-4xl md:text-5xl font-playfair font-bold text-white mb-6">Traitement Terminé</h1>
        <p class="text-brand-cream/70 max-w-md mx-auto mb-12 leading-relaxed">
            Votre message a été collecté et encrypté avec succès. <br>
            Consolas reviendra vers vous dès que le modèle aura fini l'analyse (sous 48h).
        </p>

        <a href="index.html" class="group relative inline-flex items-center gap-3 bg-brand-purple text-brand-night px-10 py-4 rounded-full font-bold uppercase tracking-widest text-xs transition-all hover:bg-white overflow-hidden">
            <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            <i class="fa-solid fa-arrow-left"></i> Revenir au Portfolio
        </a>
    </div>

    <!-- Data flow bg -->
    <div class="absolute inset-0 z-0 opacity-10 pointer-events-none overflow-hidden">
        <div class="p-10 font-mono text-[10px] text-brand-purple leading-tight break-all">
            <script>
                for(let i=0; i<3000; i++) document.write(Math.floor(Math.random()*2));
            </script>
        </div>
    </div>

    <script>
        gsap.from("h1, p", { opacity: 0, scale: 0.9, duration: 1, delay: 0.8, stagger: 0.2 });
        gsap.from("a", { opacity: 0, y: 30, duration: 1.2, delay: 1.5, ease: "back.out(1.7)" });
    </script>
</body>
</html>
